name: Validate API Contract

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docs/api/openapi.yaml'
      - 'packages/types/src/**'
      - 'docs/api/README.md'
      - 'services/api/src/**'
      - 'scripts/validate-*.ts'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'docs/api/openapi.yaml'
      - 'packages/types/src/**'
      - 'docs/api/README.md'
      - 'services/api/src/**'
      - 'scripts/validate-*.ts'

jobs:
  validate-api-contract:
    name: Validate API Contract
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Validate OpenAPI spec
        run: pnpm validate:openapi
        continue-on-error: false
      
      - name: Validate TypeScript types
        run: pnpm validate:types
        continue-on-error: false
      
      - name: Validate documentation
        run: pnpm validate:docs
        continue-on-error: false
      
      - name: Run all validations
        run: pnpm validate:all
        continue-on-error: false
      
      - name: Validate runtime (server build)
        run: |
          cd services/api
          pnpm validate:runtime || echo "Runtime validation skipped (may require env vars)"
        continue-on-error: true

